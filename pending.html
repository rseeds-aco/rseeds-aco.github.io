<html lang="en">
<head>
<meta charset="UTF-8">

<title>Pending — rseeds-aco</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0a0d14;
    --surface:      #111520;
    --border:       #1e2535;
    --dim:          #4a5568;
    --muted:        #8892a4;
    --bright:       #e8edf5;
    --accent-int:   #4fc3f7;
    --accent-float: #81c784;
    --accent-text:  #ff8a65;
    --accent-bool:  #ce93d8;
    --accent-amber: #f9a825;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--bright);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .tty-wrap {
    width: 100%;
    max-width: 600px;
    margin-bottom: 40px;
    animation: fadeIn 0.8s ease both;
  }

  .tty-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  .content {
    max-width: 480px;
    animation: slideUp 0.6s 0.2s ease both;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  h1 span { color: var(--accent-amber); }

  .desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.9;
    margin-bottom: 32px;
  }

  /* Blinking cursor on the job id line */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 13px;
    background: var(--accent-float);
    vertical-align: middle;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Status strip */
  .status-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 12px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 32px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    flex-wrap: wrap;
    gap: 12px;
  }

  .led {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
  }

  .led-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .led-on-green  { background: var(--accent-float); box-shadow: 0 0 6px var(--accent-float); }
  .led-on-amber  { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber);
                    animation: pulse 1.8s ease-in-out infinite; }
  .led-off       { background: #1a2535; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }

  .back-link {
    font-size: 11px;
    color: var(--accent-int);
    letter-spacing: 0.08em;
    border: 1px solid rgba(79,195,247,0.25);
    padding: 10px 24px;
    border-radius: 3px;
    background: rgba(79,195,247,0.05);
    transition: background 0.15s, border-color 0.15s;
    display: inline-block;
  }

  .back-link:hover {
    background: rgba(79,195,247,0.1);
    border-color: var(--accent-int);
  }

  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
